networks:
  llm-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    networks:
      - llm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm -d llm_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llm-redis
    networks:
      - llm-net
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    restart: unless-stopped
    command: redis-server --save 60 1

  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    container_name: llm-gateway
    environment:
      DATABASE_URL: postgresql+asyncpg://llm:llm@postgres:5432/llm_platform
      REDIS_URL: redis://redis:6379/0
      RAY_SERVE_URL: http://10.208.211.62:8001
      ADMIN_SECRET: "${ADMIN_SECRET:-changeme}"
      NO_PROXY: "localhost,127.0.0.1,10.0.0.0/8,.ongc.co.in,postgres,redis,10.208.211.62"
      no_proxy: "localhost,127.0.0.1,10.0.0.0/8,.ongc.co.in,postgres,redis,10.208.211.62"
    ports:
      - "${GATEWAY_HOST_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - llm-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: llm-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NO_PROXY: "localhost,127.0.0.1,10.0.0.0/8,.ongc.co.in"
      no_proxy: "localhost,127.0.0.1,10.0.0.0/8,.ongc.co.in"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - llm-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: llm-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-ongc1234}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - postgres
    networks:
      - llm-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: llm-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HOST_PORT:-10080}:80"
    depends_on:
      - gateway
    networks:
      - llm-net
    restart: unless-stopped

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
