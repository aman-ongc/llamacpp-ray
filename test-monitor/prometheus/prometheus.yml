global:
  scrape_interval:     10s
  evaluation_interval: 10s

scrape_configs:

  # LLM gateway metrics — all the llm_* metrics plus per-node GPU/llama/CPU
  - job_name: "llm-gateway"
    honor_labels: true        # use the instance labels embedded in the metrics
    static_configs:
      - targets: ["exporter:9101"]

  # Simulated node-exporter — 15 stub targets so up{job="node-exporter"} = 15
  # Ports 9201-9215 map to: .62, .52-.61 (text), .63/.64/.65/.67 (multimodal)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["exporter:9201"]
        labels: {instance: "10.208.211.62:9100"}
      - targets: ["exporter:9202"]
        labels: {instance: "10.208.211.52:9100"}
