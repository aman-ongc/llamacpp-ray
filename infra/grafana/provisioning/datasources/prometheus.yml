apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: LLM Postgres
    type: postgres
    uid: llm-postgres
    access: proxy
    url: postgres:5432
    user: llm
    secureJsonData:
      password: llm
    jsonData:
      database: llm_platform
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
